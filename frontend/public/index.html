<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#002D62" />
    <meta name="description" content="Domino Real RD - El dominó dominicano del mundo. Juega online con amigos." />
    <meta property="og:title" content="Domino Real RD" />
    <meta property="og:description" content="El dominó dominicano del mundo. Juega online." />
    <meta property="og:type" content="website" />
    <title>Domino Real RD 🎲</title>
    <style>
      body { margin: 0; background: #002D62; font-family: sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar Domino Real RD.</noscript>
    <div id="root"></div>

    <!-- Facebook SDK -->
    <script>
      window.fbAsyncInit = function() {
        if (window.FB && window.__FB_APP_ID) {
          FB.init({
            appId: window.__FB_APP_ID,
            cookie: true,
            xfbml: false,
            version: 'v19.0'
          });
        }
      };
      // FB App ID (mismo que la app móvil)
      window.__FB_APP_ID = '915990674746311';
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/es_LA/sdk.js"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </body>
</html>
